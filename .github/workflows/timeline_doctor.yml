name: Timeline Doctor

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Article ID(s) (e.g. 84991 or 84991,85002) OR a name/topic (e.g. Sonam Wangchuk) — names search the last 60 days and bypass the entity filter'
        required: true
      diagnose_only:
        description: 'Only report, change nothing (decisions saved as artifact)'
        required: false
        type: boolean
        default: false

concurrency:
  group: satya-pipeline-main   # strictly serial with the daily runner
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      slices: ${{ steps.split.outputs.slices }}
      extra_args: ${{ steps.split.outputs.extra_args }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - name: Resolve target (ids or name) and split across runners
        id: split
        env:
          SATYA_DB_URL: ${{ secrets.SATYA_DB_URL }}
          SATYA_DB_TOKEN: ${{ secrets.SATYA_DB_TOKEN }}
        run: |
          pip -q install libsql
          python3 - << 'EOF'
          import os, re, json, math, time
          target = """${{ github.event.inputs.target }}""".strip()
          extra_args = ""

          if re.fullmatch(r'[\d,\s]+', target):
              ids = [int(x) for x in target.replace(' ', '').split(',') if x]
          else:
              # Name/topic mode: find matching articles from the last 60 days.
              # The human named the story -> bypass the entity eligibility filter
              # and stamp the story with its own entity key.
              import libsql
              conn = libsql.connect(database=os.environ['SATYA_DB_URL'], auth_token=os.environ['SATYA_DB_TOKEN'])
              cur = conn.cursor()
              like = f"%{target}%"
              # All-time search; if the name has more than 60 matches, keep the
              # MOST RECENT 60, but hand them to the judges oldest-first so the
              # story builds chronologically.
              cur.execute("""
                  SELECT id FROM articles
                  WHERE (title LIKE ? OR rephrased_title LIKE ?)
                    AND status IN ('classified','entity_processed','processed')
                  ORDER BY scraped_at DESC LIMIT 60
              """, (like, like))
              ids = [int(r[0]) for r in cur.fetchall()][::-1]
              key = re.sub(r'[^a-z0-9]+', '_', target.lower()).strip('_')
              extra_args = f"--allow-ineligible --extra-key {key}"
              print(f"Name mode: '{target}' -> {len(ids)} article(s), entity key '{key}'")

          if not ids:
              raise SystemExit(f"No articles found for target: {target}")

          n = min(18, len(ids))  # parallelism decided automatically
          per = math.ceil(len(ids) / n)
          os.makedirs('slices', exist_ok=True)
          for i in range(n):
              with open(f'slices/slice_{i}.txt', 'w') as f:
                  f.write('\n'.join(str(x) for x in ids[i*per:(i+1)*per]))
          print(f"{len(ids)} article(s) across {n} runner(s)")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('slices=' + json.dumps(list(range(n))) + '\n')
              f.write(f'extra_args={extra_args}\n')
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: doctor-slices-${{ github.run_id }}
          path: slices/
          retention-days: 7

  judge:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      max-parallel: 18
      fail-fast: false
      matrix:
        slice: ${{ fromJSON(needs.prepare.outputs.slices) }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - name: Free disk space (models need ~13GB)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
      - uses: actions/setup-python@v5
        with: { python-version: '3.10', cache: 'pip' }
      - name: Install dependencies
        run: |
          pip install huggingface_hub libsql
          pip install -r requirements.txt
      - name: Cache LLM Models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: ./models
          key: qwen-14b-local-models-v3-q5km
      - name: Download LLM Models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          python -c '
          from huggingface_hub import hf_hub_download
          hf_hub_download(repo_id="bartowski/gemma-2-2b-it-GGUF", filename="gemma-2-2b-it-Q4_K_M.gguf", local_dir="./models")
          hf_hub_download(repo_id="bartowski/Qwen2.5-14B-Instruct-GGUF", filename="Qwen2.5-14B-Instruct-Q5_K_M.gguf", local_dir="./models")
          '
      - uses: actions/download-artifact@v4
        with:
          name: doctor-slices-${{ github.run_id }}
          path: slices/
      - name: Judge slice ${{ matrix.slice }}
        env:
          SATYA_DB_URL: ${{ secrets.SATYA_DB_URL }}
          SATYA_DB_TOKEN: ${{ secrets.SATYA_DB_TOKEN }}
          MODEL_2B_PATH: "./models/gemma-2-2b-it-Q4_K_M.gguf"
          MODEL_GATE_PATH: "./models/Qwen2.5-14B-Instruct-Q5_K_M.gguf"
        run: |
          mkdir -p decisions
          python timeline_doctor.py --judge \
            --ids-file "slices/slice_${{ matrix.slice }}.txt" \
            --tag "${{ matrix.slice }}" \
            --out "decisions/decisions_${{ matrix.slice }}.jsonl" \
            ${{ needs.prepare.outputs.extra_args }}
      - uses: actions/upload-artifact@v4
        with:
          name: doctor-decisions-${{ github.run_id }}-${{ matrix.slice }}
          path: decisions/
          retention-days: 30

  apply:
    needs: judge
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/setup-python@v5
        with: { python-version: '3.10', cache: 'pip' }
      - name: Install dependencies
        run: |
          pip install numpy libsql
      - uses: actions/download-artifact@v4
        with:
          pattern: doctor-decisions-${{ github.run_id }}-*
          path: decisions/
          merge-multiple: true
      - name: Decisions summary
        run: |
          cat decisions/*.jsonl | python -c "
          import sys, json, collections
          c = collections.Counter(json.loads(l)['action'] for l in sys.stdin)
          print('DECISIONS:', dict(c))"

      - name: Apply repairs
        if: github.event.inputs.diagnose_only != 'true'
        env:
          SATYA_DB_URL: ${{ secrets.SATYA_DB_URL }}
          SATYA_DB_TOKEN: ${{ secrets.SATYA_DB_TOKEN }}
        run: |
          python timeline_doctor.py --apply --decisions-dir ./decisions
      - name: Diagnose-only notice
        if: github.event.inputs.diagnose_only == 'true'
        run: echo "diagnose_only — nothing written. Decisions saved as artifacts."

      # Hand the baton back: after repairs, wake the normal runner. Harmless
      # when there's nothing to do (it exits in ~a minute with has_more=false);
      # useful when a backlog is waiting — no need to wait for the evening cron.
      - name: Trigger the daily runner
        if: github.event.inputs.diagnose_only != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/timeline_pipeline.yml/dispatches \
            -d '{"ref":"main"}'
          echo "Daily runner dispatched."
